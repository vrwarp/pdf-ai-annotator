name: Docker Publish

# Publish the image to Docker Hub when changes land on main (i.e. a PR is
# merged), or when a version tag is pushed. Also runnable on demand.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: vrwarp/pdf-ai-annotator

jobs:
  publish:
    name: Build and push to Docker Hub
    runs-on: ubuntu-latest
    # Skip on forks, which do not have access to the Docker Hub secrets.
    if: github.repository == 'vrwarp/pdf-ai-annotator'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          # - `latest` for the default branch
          # - the short commit SHA for traceability
          # - semver tags (1.2.3, 1.2) when a v* git tag is pushed
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
