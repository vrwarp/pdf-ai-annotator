name: Docker Publish

# - Pull requests to main: dry run — build the image (no push) to validate the
#   Dockerfile and the full publish path.
# - Push to main / v* tags: build and push to Docker Hub.
# - Manual: runnable on demand.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: vrwarp/pdf-ai-annotator

jobs:
  publish:
    name: Build image (push on main)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only authenticate when we actually intend to push. Pull-request dry runs
      # (and forks, which have no access to the secrets) skip this step.
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && github.repository == 'vrwarp/pdf-ai-annotator'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          # - `latest` for the default branch
          # - the short commit SHA for traceability
          # - semver tags (1.2.3, 1.2) when a v* git tag is pushed
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Dry run on pull requests: build only, do not push. Push only from
          # the canonical repository (never from forks).
          push: ${{ github.event_name != 'pull_request' && github.repository == 'vrwarp/pdf-ai-annotator' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
