{% extends "base.html" %}
{% block title %}Logs — PDF AI Annotator{% endblock %}

{% block content %}
<div class="p-8" x-data="logsPage()" x-init="init()">

  <!-- Header -->
  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="text-2xl font-bold text-gray-900">Logs</h1>
      <p class="text-sm text-gray-500 mt-1">Live application log output</p>
    </div>
    <div class="flex items-center gap-3">
      <!-- Auto-refresh toggle -->
      <label class="flex items-center gap-2 cursor-pointer">
        <div class="relative">
          <input type="checkbox" class="sr-only" x-model="autoRefresh" />
          <div class="w-9 h-5 rounded-full transition-colors"
            :class="autoRefresh ? 'bg-indigo-600' : 'bg-gray-300'"></div>
          <div class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform"
            :class="autoRefresh ? 'translate-x-4' : 'translate-x-0'"></div>
        </div>
        <span class="text-sm text-gray-600">Auto-refresh</span>
      </label>
      <button @click="clearLogs()"
        class="px-3 py-1.5 text-sm text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
        Clear view
      </button>
    </div>
  </div>

  <!-- Log level filter -->
  <div class="flex items-center gap-2 mb-4">
    <span class="text-xs text-gray-500 font-medium">Filter:</span>
    {% for level in ['ALL', 'INFO', 'WARNING', 'ERROR'] %}
    <button @click="filter = '{{ level }}'"
      class="px-2.5 py-1 text-xs font-medium rounded-full border transition-colors"
      :class="filter === '{{ level }}'
        ? '{% if level == 'ERROR' %}bg-red-100 border-red-300 text-red-700{% elif level == 'WARNING' %}bg-yellow-100 border-yellow-300 text-yellow-700{% elif level == 'INFO' %}bg-blue-100 border-blue-300 text-blue-700{% else %}bg-indigo-100 border-indigo-300 text-indigo-700{% endif %}'
        : 'bg-white border-gray-200 text-gray-500 hover:border-gray-300'">
      {{ level }}
    </button>
    {% endfor %}
  </div>

  <!-- Log table -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-gray-50 border-b border-gray-100">
            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider w-24">Time</th>
            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider w-24">Level</th>
            <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Message</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-50" id="log-tbody">
          <template x-for="(log, i) in filteredLogs" :key="i">
            <tr class="hover:bg-gray-50">
              <td class="px-4 py-2.5 text-xs text-gray-400 font-mono whitespace-nowrap" x-text="log.ts"></td>
              <td class="px-4 py-2.5">
                <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium"
                  :class="{
                    'bg-red-100 text-red-700':    log.level === 'ERROR',
                    'bg-yellow-100 text-yellow-700': log.level === 'WARNING',
                    'bg-blue-100 text-blue-700':  log.level === 'INFO'
                  }"
                  x-text="log.level"></span>
              </td>
              <td class="px-4 py-2.5 text-xs text-gray-700 font-mono" x-text="log.msg"></td>
            </tr>
          </template>
          <template x-if="filteredLogs.length === 0">
            <tr>
              <td colspan="3" class="px-4 py-12 text-center text-sm text-gray-400">No log entries</td>
            </tr>
          </template>
        </tbody>
      </table>
    </div>
    <!-- Footer -->
    <div class="flex items-center justify-between px-4 py-3 border-t border-gray-100 bg-gray-50">
      <span class="text-xs text-gray-400">
        Showing <span x-text="filteredLogs.length"></span> entries
      </span>
      <span class="text-xs text-gray-400" x-show="autoRefresh">
        Refreshing every 2 s
      </span>
    </div>
  </div>
</div>

<script>
function logsPage() {
  return {
    allLogs: {{ logs | tojson }},
    filter: 'ALL',
    autoRefresh: true,
    _timer: null,

    get filteredLogs() {
      const rows = this.filter === 'ALL' ? this.allLogs : this.allLogs.filter(l => l.level === this.filter);
      return rows.slice().reverse();
    },

    init() {
      this.$watch('autoRefresh', v => {
        if (v) this.startTimer(); else clearInterval(this._timer);
      });
      this.startTimer();
    },

    startTimer() {
      clearInterval(this._timer);
      this._timer = setInterval(() => this.fetchLogs(), 2000);
    },

    async fetchLogs() {
      try {
        const r = await fetch('/api/logs');
        const d = await r.json();
        this.allLogs = d.logs;
      } catch (_) {}
    },

    clearLogs() {
      this.allLogs = [];
    },
  };
}
</script>
{% endblock %}
